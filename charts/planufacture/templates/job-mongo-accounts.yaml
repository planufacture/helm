{{- if .Values.mongo.enabled }}
{{- $context := merge (dict "key" "mongo") $ }}
apiVersion: batch/v1
kind: Job
metadata:
  name: "{{.Release.Name}}"
  labels:
    {{- include "planufacture.labels" . | nindent 4 }}
  annotations:
    # This is what defines this resource as a hook. Without this line, the
    # job is considered part of the release.
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    metadata:
      name: "{{.Release.Name}}"
      labels:
        {{- include "planufacture.labels" . | nindent 8 }}
    spec:
      securityContext:
        runAsUser: 999
        fsGroup: 999
      restartPolicy: Never
      containers:
      - name: post-install-job
        image: "{{ .Values.mongo.image.repository }}:{{ .Values.mongo.image.tag }}"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          value: {{ .Values.mongo.username }}
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "planufacture.fullname" $context }}
              key: mongo-root-password
        {{- range $key, $val := .Values.microServices }}
        {{- $context := merge (dict "key" ($key | kebabcase)) $ }}
        {{- if .mongo }}
        - name: {{ $context.key | upper | replace "-" "_" }}_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "planufacture.fullname" $context }}
              key: mongo-password
        {{- end }}
        {{- end }}
        command:
        - /bin/bash
        - -c
        - |
          # Wait for mongo to be ready and accepting authenticated connections
          until mongosh "mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongo:27017/admin?directConnection=true" --eval "db.adminCommand('ping')" &>/dev/null; do
            echo "Waiting for mongo to be ready..."
            sleep 5
          done

          mongosh "mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongo:27017/admin?directConnection=true" --eval '
          const users = [];
          {{- range $key, $val := .Values.microServices }}
          {{- if .mongo }}
          users.push({
               user: "{{ .mongo.db }}",
               pwd: process.env.{{ .mongo.db | upper | replace "-" "_" }}_PASSWORD,
               roles: [
                 {
                   db: "{{ .mongo.db }}",
                   role: "dbOwner"
                 }
               ],
               customData: {
                   createdBy: "Helm setup script"
               }
           });
          {{- end }}
          {{- end }}

          users.forEach(user => {
            if (!db.getSiblingDB("admin").getUser(user.user)) {
              db.getSiblingDB("admin").createUser(user);
              print("Created user: " + user.user);
            } else {
              print("User already exists: " + user.user);
            }
          });
          '
    {{- with .Values.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
    {{- end }}
{{- end }}
