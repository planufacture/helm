{{- if .Values.mongo.enabled}}
{{- $context := merge (dict "key" "mongo") $ }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "planufacture.fullname" $context }}
  labels:
    {{- include "planufacture.labels" $context | nindent 4 }}
spec:
  revisionHistoryLimit: 3
  replicas: 1    # or we can even skip this, just want to test the HAP below, otherwise start with 3 lets say
  selector:
    matchLabels:
      {{- include "planufacture.selectorLabels" $context | nindent 6 }}
  serviceName: mongo
  template:
    metadata:
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
      labels:
        {{- include "planufacture.labels" $context | nindent 8 }}
        {{- with $.Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      securityContext:
        runAsUser: 999
        runAsNonRoot: true
        fsGroup: 999
    {{- with .Values.mongo.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
    {{- end }}
      initContainers:
        - name: setup-keyfile
          image: "{{ .Values.mongo.image.repository }}:{{ .Values.mongo.image.tag }}"
          command:
            - /bin/bash
            - -c
            - |
              cp /keyfile-secret/mongodb-keyfile /data/keyfile/mongodb-keyfile
              chmod 400 /data/keyfile/mongodb-keyfile
              chown 999:999 /data/keyfile/mongodb-keyfile
          volumeMounts:
          - mountPath: /data/keyfile
            name: mongodb-keyfile
          - mountPath: /keyfile-secret
            name: mongodb-keyfile-secret
            readOnly: true
      containers:
        - name: mongo
          image: "{{ .Values.mongo.image.repository }}:{{ .Values.mongo.image.tag }}"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - /bin/bash
            - -c
            - |
              # Save credentials before unsetting env vars
              ROOT_USER="${MONGO_INITDB_ROOT_USERNAME}"
              ROOT_PASS="${MONGO_INITDB_ROOT_PASSWORD}"

              # Start mongod in the background
              mongod --replSet rs0 --bind_ip_all --keyFile /data/keyfile/mongodb-keyfile &
              MONGOD_PID=$!

              # Unset so mongosh doesn't try to auto-authenticate
              unset MONGO_INITDB_ROOT_USERNAME MONGO_INITDB_ROOT_PASSWORD

              # Wait for mongod to be ready
              until mongosh --host localhost:27017 --directConnection --eval "db.adminCommand('ping')" &>/dev/null; do
                sleep 2
              done

              # Initialize replica set and create root user if needed
              mongosh --host localhost:27017 --directConnection --eval "
                try {
                  rs.status();
                  print('Replica set already initialized');
                } catch(e) {
                  print('Initializing replica set...');
                  rs.initiate({
                    _id: 'rs0',
                    members: [{ _id: 0, host: '{{ include "planufacture.fullname" $context }}-0:27017' }]
                  });
                  print('Waiting for primary election...');
                  while (rs.status().myState !== 1) {
                    sleep(1000);
                  }
                  print('Node is primary, creating root user...');
                  db.getSiblingDB('admin').createUser({
                    user: '${ROOT_USER}',
                    pwd: '${ROOT_PASS}',
                    roles: [{ role: 'root', db: 'admin' }]
                  });
                  print('Root user created successfully');
                }
              "

              # Wait for mongod to exit
              wait $MONGOD_PID
          env:
          - name: MONGO_INITDB_ROOT_USERNAME
            value: {{ .Values.mongo.username }}
          - name: MONGO_INITDB_ROOT_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ include "planufacture.fullname" $context }}
                key: mongo-root-password
          ports:
          - containerPort: 27017
            name: mongo
          volumeMounts:
          - mountPath: /data/db
            name: {{ include "planufacture.fullname" $context }}-data
          - mountPath: /data/keyfile
            name: mongodb-keyfile
            readOnly: true
          resources:
{{ toYaml .Values.mongo.resources | indent 12 }}
          livenessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - mongosh --host localhost --port 27017 --username ${MONGO_INITDB_ROOT_USERNAME} --password ${MONGO_INITDB_ROOT_PASSWORD} --authenticationDatabase admin --eval "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - mongosh --host localhost --port 27017 --username ${MONGO_INITDB_ROOT_USERNAME} --password ${MONGO_INITDB_ROOT_PASSWORD} --authenticationDatabase admin --eval "db.adminCommand('ping')"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: mongodb-keyfile
          emptyDir: {}
        - name: mongodb-keyfile-secret
          secret:
            secretName: {{ include "planufacture.fullname" $context }}
            defaultMode: 0400
  volumeClaimTemplates:
    - metadata:
        name: {{ include "planufacture.fullname" $context }}-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        {{- if .Values.mongo.storageClassName }}
        storageClassName: {{ .Values.mongo.storageClassName }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.mongo.storage | default "25Gi" }}
{{- end }}
